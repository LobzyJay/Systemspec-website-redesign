<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Stat pill</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 32px 28px; background: var(--bg-canvas); }
  .stage {
    background: color-mix(in srgb, var(--bg-canvas) 60%, var(--bg-surface-muted) 40%);
    border-radius: 22px;
    border: 1px solid var(--border-subtle);
    padding: 28px;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: 160px;
  }
  .pill {
    display:inline-flex; align-items:center; gap: 12px;
    background: var(--bg-inverse); color: #f7f8f9;
    padding: 6px 22px 6px 6px;
    border-radius: 9999px;
    box-shadow: var(--shadow-e3);
  }
  .stack { display:flex; }
  .av { width: 36px; height: 36px; border-radius: 9999px; border: 2px solid var(--bg-inverse); background: var(--bg-surface-muted); margin-left: -8px; display:grid; place-items:center; font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); font-weight:500; }
  .av:first-child { margin-left: 0; }
  .av.av1 { background: #ECE6D7; }
  .av.av2 { background: #D7E2F4; color: #1F4385;}
  .av.av3 { background: #CDF2E7; color: #0D7A60;}
  .lbl { font-size: 11px; color: rgba(247,248,249,.7); }
  .val { font-family: var(--font-display); font-size: 18px; font-weight: 600; line-height:1; margin-top:2px; }
</style>
</head>
<body>
  <p class="eyebrow" style="margin:0 0 14px;">Stat pill · floating callout · inverse · only place avatars stack</p>
  <div class="stage">
    <div class="pill">
      <div class="stack">
        <div class="av av1">AO</div>
        <div class="av av2">CN</div>
        <div class="av av3">FK</div>
      </div>
      <div>
        <div class="lbl">Trusted by</div>
        <div class="val">800+ institutions</div>
      </div>
    </div>
  </div>
</body></html>
