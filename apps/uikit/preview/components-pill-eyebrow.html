<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Pills, eyebrows, badges</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 28px; display:flex; flex-direction:column; gap: 16px; }
  .stack { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .eb {
    display:inline-flex; align-items:center; gap: 8px;
    height: 24px; padding: 0 12px; border-radius: 9999px;
    background: var(--accent-subtle); color: var(--accent-default);
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    letter-spacing: .22em; text-transform: uppercase;
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent-default) 18%, transparent);
  }
  .eb .dot { width:4px; height:4px; border-radius: 9999px; background: var(--accent-default); }
  .tag {
    display:inline-flex; align-items:center; gap: 8px;
    height: 24px; padding: 0 12px; border-radius: 9999px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    letter-spacing: .22em; text-transform: uppercase;
  }
  .tag.press   { background: #E7F0FB; color: #2769C4; box-shadow: inset 0 0 0 1px #2769C428; }
  .tag.insight { background: #E6F4F1; color: #017A6A; box-shadow: inset 0 0 0 1px #017A6A28; }
  .tag.case    { background: #E7F6EC; color: #2E8B57; box-shadow: inset 0 0 0 1px #2E8B5728; }
  .tag .dot { width:4px; height:4px; border-radius:9999px; background: currentColor; }

  .proof { display:flex; flex-direction: column; gap:4px; padding: 14px 16px; border:1px solid var(--border-subtle); border-radius: 12px; background: var(--bg-surface); width: 280px; }
  .proof .k { font-family: var(--font-mono); font-size: 10px; letter-spacing:.22em; text-transform: uppercase; color: var(--text-muted); }
  .proof .v { font-size: 14px; font-weight: 500; color: var(--text-primary); }
</style>
</head>
<body>
  <p class="eyebrow" style="margin:0">Eyebrows, kind-tags & proof labels</p>
  <div class="stack">
    <span class="eb"><span class="dot"></span>Established 1992</span>
    <span class="eb"><span class="dot"></span>Capabilities</span>
    <span class="eb"><span class="dot"></span>For institutions</span>
  </div>
  <div class="stack">
    <span class="tag press"><span class="dot"></span>Press</span>
    <span class="tag insight"><span class="dot"></span>Insight</span>
    <span class="tag case"><span class="dot"></span>Case study</span>
  </div>
  <div class="proof">
    <span class="k">Proof</span>
    <span class="v">Powering federal collections since 2012</span>
  </div>
</body></html>
