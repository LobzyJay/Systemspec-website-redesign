<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Group · STSL portfolio</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 28px; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .tile { aspect-ratio: 5/2; border:1px solid var(--border-subtle); border-radius: 14px; display:grid; place-items:center; padding: 12px; background: var(--bg-surface); }
  .tile img { max-width: 70%; max-height: 36px; object-fit: contain; }
  .tile.r { background: color-mix(in srgb, var(--brand-teal) 10%, var(--bg-surface-raised));}
  .tile.p { background: color-mix(in srgb, var(--product-pouchii) 10%, var(--bg-surface-raised));}
  .tile.h { background: color-mix(in srgb, #1F4385 10%, var(--bg-surface-raised));}
  .tile.f { background: color-mix(in srgb, var(--product-fundacause) 10%, var(--bg-surface-raised));}
  .tile.w { background: color-mix(in srgb, #D99A00 10%, var(--bg-surface-raised));}
  .tile.m { background: color-mix(in srgb, var(--product-monicenta) 10%, var(--bg-surface-raised));}
</style>
</head>
<body>
  <p class="eyebrow" style="margin: 0 0 12px;">STSL Group · six product brands · single panel-tint pattern</p>
  <div class="grid">
    <div class="tile r"><img src="../assets/group/remita.svg" alt="Remita"/></div>
    <div class="tile p"><img src="../assets/group/pouchii.png" alt="Pouchii"/></div>
    <div class="tile h"><img src="../assets/group/humanmanager.svg" alt="HumanManager"/></div>
    <div class="tile f"><img src="../assets/group/fundacause.svg" alt="FundACause"/></div>
    <div class="tile w"><img src="../assets/group/whatadeal.svg" alt="Whatadeal"/></div>
    <div class="tile m"><img src="../assets/group/monicenta.png" alt="Monicenta"/></div>
  </div>
</body></html>
