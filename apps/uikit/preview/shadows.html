<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Shadows · espresso</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 32px 28px; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .tile { aspect-ratio: 1 / 1; background: var(--bg-surface); border-radius: 16px; display:flex; flex-direction:column; justify-content:flex-end; padding: 14px; }
  .tile .k { font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
  .tile .d { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; }
  .e1 { box-shadow: var(--shadow-e1); }
  .e2 { box-shadow: var(--shadow-e2); }
  .e3 { box-shadow: var(--shadow-e3); }
  .e4 { box-shadow: var(--shadow-e4); }
  .inner { display:flex; align-items:center; gap:12px; margin-top: 22px; padding: 14px; border-radius: 16px; background: var(--bg-surface); box-shadow: var(--shadow-inner-hi), var(--shadow-e2); }
  .inner .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing:.18em; text-transform: uppercase; }
</style>
</head>
<body>
  <p class="eyebrow">Elevation · espresso (rgba 11,12,15) · NEVER pure black</p>
  <div class="row">
    <div class="tile e1"><span class="d">resting card</span><span class="k">e1</span></div>
    <div class="tile e2"><span class="d">raised</span><span class="k">e2</span></div>
    <div class="tile e3"><span class="d">hover · lift</span><span class="k">e3</span></div>
    <div class="tile e4"><span class="d">modal</span><span class="k">e4</span></div>
  </div>
  <div class="inner">
    <span class="lbl">shadow-inner-hi</span>
    <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);">inset 0 1px 0 rgba(255,255,255,.7) — the card's inner glow</span>
  </div>
</body></html>
