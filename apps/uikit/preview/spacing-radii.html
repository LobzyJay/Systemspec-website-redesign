<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Spacing & radii</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 28px; }
  .row-h { display:flex; align-items:center; gap: 14px; padding: 6px 0; }
  .bar { background: var(--accent-default); height: 10px; border-radius: 4px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing:.12em; text-transform: uppercase; width: 70px; }
  .px  { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); width: 56px; text-align:right; }
  .radii-row { display:flex; gap:10px; margin-top: 18px; align-items:flex-end;}
  .rad { width: 70px; height: 70px; background: var(--bg-surface); border:1px solid var(--border-default); display:flex; align-items:flex-end; justify-content:center; padding: 6px; font-family:var(--font-mono); font-size:10px; color: var(--text-muted); }
</style>
</head>
<body>
  <p class="eyebrow">Spacing · 4px base, 8-step semantic</p>
  <div class="row-h"><span class="lab">space-1</span><span class="bar" style="width:4px"></span><span class="px">4 · 0.25rem</span></div>
  <div class="row-h"><span class="lab">space-2</span><span class="bar" style="width:8px"></span><span class="px">8 · 0.5rem</span></div>
  <div class="row-h"><span class="lab">space-3</span><span class="bar" style="width:12px"></span><span class="px">12 · 0.75rem</span></div>
  <div class="row-h"><span class="lab">space-4</span><span class="bar" style="width:16px"></span><span class="px">16 · 1rem</span></div>
  <div class="row-h"><span class="lab">space-6</span><span class="bar" style="width:24px"></span><span class="px">24 · 1.5rem</span></div>
  <div class="row-h"><span class="lab">space-8</span><span class="bar" style="width:32px"></span><span class="px">32 · 2rem</span></div>
  <div class="row-h"><span class="lab">space-12</span><span class="bar" style="width:48px"></span><span class="px">48 · 3rem</span></div>
  <div class="row-h"><span class="lab">space-16</span><span class="bar" style="width:64px"></span><span class="px">64 · 4rem</span></div>
  <div class="row-h"><span class="lab">space-24</span><span class="bar" style="width:96px"></span><span class="px">96 · 6rem</span></div>

  <p class="eyebrow" style="margin-top:18px">Radii · 4 / 8 / 12 / 16 / 24 / 28 + pill</p>
  <div class="radii-row">
    <div class="rad" style="border-radius:4px">4 · sm</div>
    <div class="rad" style="border-radius:8px">8 · md</div>
    <div class="rad" style="border-radius:12px">12 · lg</div>
    <div class="rad" style="border-radius:16px">16 · xl</div>
    <div class="rad" style="border-radius:24px">24 · 2xl</div>
    <div class="rad" style="border-radius:28px">28 · 3xl</div>
    <div class="rad" style="border-radius:9999px; width:120px">pill</div>
  </div>
</body></html>
