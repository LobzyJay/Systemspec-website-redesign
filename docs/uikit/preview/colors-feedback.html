<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Feedback · muted</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pair { display:flex; align-items:stretch; border-radius:14px; overflow:hidden; border:1px solid var(--border-subtle); }
  .pair .solid { width: 50%; padding:14px; color:#fff; display:flex; flex-direction:column; justify-content:space-between; }
  .pair .wash  { width: 50%; padding:14px; display:flex; flex-direction:column; justify-content:space-between; }
  .pair .lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; opacity:.85; }
  .pair .nm { font-family:var(--font-display); font-size:14px; font-weight:600; margin-top:4px;}
  .pair .hx { font-family:var(--font-mono); font-size:10px; opacity:.8; }
</style>
</head>
<body>
  <p class="eyebrow">Feedback colors · muted, never out-shouting the cream</p>
  <div class="grid">
    <div class="pair">
      <div class="solid" style="background:var(--feedback-success)">
        <div class="lbl">success</div>
        <div><div class="nm">Forest</div><div class="hx">#2E8B57</div></div>
      </div>
      <div class="wash" style="background:var(--feedback-success-subtle); color:var(--feedback-success)">
        <div class="lbl">success / subtle</div>
        <div><div class="nm">Wash</div><div class="hx">#E7F6EC</div></div>
      </div>
    </div>
    <div class="pair">
      <div class="solid" style="background:var(--feedback-warning)">
        <div class="lbl">warning</div>
        <div><div class="nm">Amber</div><div class="hx">#D99A00</div></div>
      </div>
      <div class="wash" style="background:var(--feedback-warning-subtle); color:var(--feedback-warning)">
        <div class="lbl">warning / subtle</div>
        <div><div class="nm">Wash</div><div class="hx">#FFF8E7</div></div>
      </div>
    </div>
    <div class="pair">
      <div class="solid" style="background:var(--feedback-danger)">
        <div class="lbl">danger</div>
        <div><div class="nm">Carmine</div><div class="hx">#C0353A</div></div>
      </div>
      <div class="wash" style="background:var(--feedback-danger-subtle); color:var(--feedback-danger)">
        <div class="lbl">danger / subtle</div>
        <div><div class="nm">Wash</div><div class="hx">#FDEBEC</div></div>
      </div>
    </div>
    <div class="pair">
      <div class="solid" style="background:var(--feedback-info)">
        <div class="lbl">info</div>
        <div><div class="nm">Cobalt</div><div class="hx">#2769C4</div></div>
      </div>
      <div class="wash" style="background:var(--feedback-info-subtle); color:var(--feedback-info)">
        <div class="lbl">info / subtle</div>
        <div><div class="nm">Wash</div><div class="hx">#E7F0FB</div></div>
      </div>
    </div>
  </div>
</body></html>
