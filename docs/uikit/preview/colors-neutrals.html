<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Neutrals · cream paper system</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .scale { display:grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .step { height: 80px; border-radius:10px; border:1px solid var(--border-subtle); padding:8px; display:flex; flex-direction:column; justify-content:flex-end; }
  .step .k { font-family: var(--font-mono); font-size:10px; }
  .step .v { font-family: var(--font-mono); font-size:9px; opacity: .7; }
  .surfaces { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-top:16px;}
  .surf { border-radius:14px; border:1px solid var(--border-subtle); height: 92px; padding:14px; display:flex; flex-direction:column; justify-content:space-between; }
  .surf .lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color: var(--text-muted); }
  .surf .nm  { font-family:var(--font-display); font-weight:600; font-size:13px; }
  .surf .hx  { font-family:var(--font-mono); font-size:10px; opacity:.7; }
</style>
</head>
<body>
  <p class="eyebrow">Neutral scale · warm-tinted, never cold grey</p>
  <div class="scale">
    <div class="step" style="background:#fff"><span class="k">0</span><span class="v">#FFFFFF</span></div>
    <div class="step" style="background:#f7f8f9"><span class="k">50</span><span class="v">#F7F8F9</span></div>
    <div class="step" style="background:#eef0f2"><span class="k">100</span><span class="v">#EEF0F2</span></div>
    <div class="step" style="background:#dde1e6"><span class="k">200</span><span class="v">#DDE1E6</span></div>
    <div class="step" style="background:#c4cad1"><span class="k">300</span><span class="v">#C4CAD1</span></div>
    <div class="step" style="background:#a0a8b2"><span class="k">400</span><span class="v">#A0A8B2</span></div>
    <div class="step" style="background:#7a828d; color:#fff"><span class="k">500</span><span class="v">#7A828D</span></div>
    <div class="step" style="background:#5b626c; color:#fff"><span class="k">600</span><span class="v">#5B626C</span></div>
    <div class="step" style="background:#41464e; color:#fff"><span class="k">700</span><span class="v">#41464E</span></div>
    <div class="step" style="background:#272a30; color:#fff"><span class="k">800</span><span class="v">#272A30</span></div>
    <div class="step" style="background:#16181c; color:#fff"><span class="k">900</span><span class="v">#16181C</span></div>
    <div class="step" style="background:#0b0c0f; color:#fff"><span class="k">950</span><span class="v">#0B0C0F</span></div>
  </div>

  <div class="surfaces">
    <div class="surf" style="background:var(--bg-canvas)">
      <span class="lbl">canvas</span>
      <div><div class="nm">Cream</div><div class="hx">#FBF8F2</div></div>
    </div>
    <div class="surf" style="background:var(--bg-surface)">
      <span class="lbl">surface</span>
      <div><div class="nm">White</div><div class="hx">#FFFFFF</div></div>
    </div>
    <div class="surf" style="background:var(--bg-surface-raised)">
      <span class="lbl">raised</span>
      <div><div class="nm">Sand</div><div class="hx">#F5F1E8</div></div>
    </div>
    <div class="surf" style="background:var(--bg-inverse); color:#f7f8f9">
      <span class="lbl" style="color:#a0a8b2">inverse</span>
      <div><div class="nm">Espresso</div><div class="hx">#0B0C0F</div></div>
    </div>
  </div>
</body></html>
