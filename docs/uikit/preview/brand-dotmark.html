<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Dot mark</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 28px; }
  .stage { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 36px; display:flex; align-items:center; justify-content:center; gap: 32px; }
  .scale-row { display:flex; align-items: flex-end; gap: 8px; }
  .dot { display:inline-block; border-radius: 9999px; }
  .a { width: 56px; height: 56px; background: var(--brand-teal); }
  .b { width: 36px; height: 36px; background: var(--brand-teal-light); }
  .c { width: 22px; height: 22px; background: var(--brand-teal-pale); }
  .legend { display:flex; flex-direction: column; gap: 6px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted);}
  .legend b { color: var(--text-primary); font-weight: 500; }
</style>
</head>
<body>
  <p class="eyebrow" style="margin: 0 0 12px;">Dot mark · the wordmark's "y" tail · brand-teal trio</p>
  <div class="stage">
    <div class="scale-row">
      <span class="dot a"></span>
      <span class="dot b"></span>
      <span class="dot c"></span>
    </div>
    <div class="legend">
      <span><b>brand-teal</b> #017A6A · 56px</span>
      <span><b>brand-teal-light</b> #83BFB7 · 36px</span>
      <span><b>brand-teal-pale</b> #B6D8D4 · 22px</span>
    </div>
  </div>
</body></html>
