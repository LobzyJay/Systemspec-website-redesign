<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Doppelrand card</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 28px; }
  .doppel {
    border-radius: 28px;
    padding: 6px;
    background: color-mix(in srgb, var(--bg-canvas) 55%, var(--bg-surface-muted) 45%);
    box-shadow: var(--shadow-e1);
    border: 1px solid var(--border-subtle);
  }
  .core {
    border-radius: 22px;
    background: var(--bg-surface);
    padding: 28px;
    box-shadow: var(--shadow-inner-hi);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .icon-chip {
    width: 44px; height: 44px; border-radius: 14px;
    padding: 4px;
    background: var(--bg-surface-raised);
    border: 1px solid var(--border-subtle);
  }
  .icon-chip .inner-chip {
    width:100%; height:100%; border-radius: 10px;
    background: var(--bg-surface);
    box-shadow: var(--shadow-inner-hi);
    display:grid; place-items:center;
    color: var(--accent-default);
  }
  h3 { font-family: var(--font-display); font-weight:600; font-size: 22px; margin: 0; letter-spacing: -0.005em;}
  .desc { color: var(--text-secondary); font-size: 14px; margin: 0; line-height: 1.55;}
  .annot { display:flex; gap: 18px; margin-top: 12px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing:.12em; text-transform: uppercase;}
  .annot span b { color: var(--accent-default); font-weight: 500; }
</style>
</head>
<body>
  <p class="eyebrow" style="margin: 0 0 14px;">Doppelrand · the signature card-in-card</p>
  <div class="doppel">
    <div class="core">
      <div class="icon-chip"><div class="inner-chip">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 9 6m-6 6 6 6m12-6h-9"/></svg>
      </div></div>
      <h3>Government-grade reliability</h3>
      <p class="desc">Built and operated to the standards of treasury platforms — not consumer apps. Proven across federal collections since 2012.</p>
    </div>
  </div>
  <div class="annot">
    <span>outer · <b>28px · p-1.5</b></span>
    <span>inner · <b>22px · shadow-inner-hi</b></span>
    <span>tint · <b>color-mix canvas/raised</b></span>
  </div>
</body></html>
