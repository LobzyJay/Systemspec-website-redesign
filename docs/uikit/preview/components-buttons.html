<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Buttons · pill + magnetic chip</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 32px 28px; display:flex; flex-direction:column; gap: 18px; }
  .stack { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
  .btn { display:inline-flex; align-items:center; gap: 12px; height: 48px; border-radius: 9999px; font-family: var(--font-sans); font-size: 15px; font-weight: 500; cursor:pointer; border: 0; transition: all 220ms cubic-bezier(.3,0,0,1.05); }
  .btn .chip { display:inline-flex; align-items:center; justify-content:center; width: 36px; height: 36px; border-radius: 9999px; transition: transform 220ms cubic-bezier(.3,0,0,1.05); }
  .btn:hover .chip { transform: translate(2px, -1px); }

  .primary   { background: var(--accent-default); color:#fff; padding: 0 6px 0 22px; box-shadow: var(--shadow-e1); }
  .primary:hover { background: var(--accent-default-hover); box-shadow: var(--shadow-e2); }
  .primary .chip { background: rgba(255,255,255,.18); }

  .secondary { background: var(--bg-surface); color: var(--text-primary); padding: 0 22px; box-shadow: inset 0 0 0 1px var(--border-default); }
  .secondary:hover { box-shadow: inset 0 0 0 1px var(--accent-default); color: var(--accent-default); }

  .ghost     { background: transparent; color: var(--text-primary); padding: 0 18px; }
  .ghost:hover { background: var(--bg-surface-raised); }

  .small     { height: 36px; font-size: 13px; padding: 0 16px; }
  .small.primary { padding: 0 4px 0 16px; }
  .small.primary .chip { width:28px; height:28px; }

  .sicon { width: 16px; height: 16px; }
  .arrow { stroke: currentColor; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <p class="eyebrow" style="margin:0">Pill buttons · h-13 hero / h-12 default · 1.5px chip buffer</p>
  <div class="stack">
    <button class="btn primary">Talk to sales
      <span class="chip"><svg class="sicon" viewBox="0 0 24 24"><path class="arrow" d="M7 17 17 7M9 7h8v8"/></svg></span>
    </button>
    <button class="btn secondary">Read the report</button>
    <button class="btn ghost">Government enquiries</button>
  </div>
  <div class="stack">
    <button class="btn small primary">Visit Remita
      <span class="chip"><svg class="sicon" viewBox="0 0 24 24" style="width:12px;height:12px"><path class="arrow" d="M7 17 17 7M9 7h8v8"/></svg></span>
    </button>
    <button class="btn small secondary">Download PDF</button>
    <button class="btn small ghost">Skip</button>
    <button class="btn small primary" disabled style="background:var(--bg-surface-raised); color:var(--text-muted); box-shadow:none; cursor:not-allowed">
      Disabled
    </button>
  </div>
</body></html>
