  <style>
    body { margin: 0; background: var(--bg-canvas); }
    /* Section rhythm — mirrors the docs' mt-24 / md:mt-32 / lg:mt-40
       breathing scale (96 → 128 → 160px). The `tight` variant is reserved
       for narrow strip bands (CTA bar, capability ribbon). */
    .kit-section { padding: 96px 0; }
    @media (min-width: 768px) { .kit-section { padding: 128px 0; } }
    @media (min-width: 1280px) { .kit-section { padding: 144px 0; } }
    .kit-section.tight { padding: 56px 0; }
    .kit-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .kit-grid-3-light { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media (max-width: 1023px) {
      .kit-grid-3 { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 640px) {
      .kit-grid-3 { grid-template-columns: 1fr !important; gap: 16px !important; }
    }
    /* Subtle hairline divider between consecutive cream sections — gives
       section transitions a pencil-line edge instead of a glued seam.
       Sections that own a background of their own opt out via .kit-section--owns-bg. */
    .kit-section + .kit-section:not(.kit-section--owns-bg) {
      border-top: 1px solid var(--border-subtle);
    }

    /* Capability strip — baseline-aligned so the small mono label sits on
       the same baseline as the body terms; consistent sep widths. The
       label gets a hairline divider on its right so it reads as a heading,
       not part of the list. */
    .kit-cap-strip {
      display: flex; flex-wrap: wrap; gap: 10px 14px;
      padding: 32px 0; border-top: 1px solid var(--border-subtle);
      border-bottom: 1px solid var(--border-subtle);
      font-size: 14px; line-height: 1.2; color: var(--text-secondary);
      align-items: baseline;
    }
    .kit-cap-strip .label {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted);
      padding-right: 16px;
      margin-right: 6px;
      border-right: 1px solid var(--border-subtle);
      align-self: stretch;
      display: inline-flex; align-items: center;
    }
    .kit-cap-strip .sep {
      color: var(--border-default);
      display: inline-block;
      width: 4px; text-align: center;
    }

    /* Cobe popup label — refined editorial map-pin. CSS Anchor Positioning
       keeps it tracking cobe's auto-injected --cobe-{id} marker; the
       --cobe-visible-{id} variable still drives opacity (0 on far side,
       1 when facing camera). Layout: a teardrop SVG pin sits directly
       above the marker, with a small city tag floating beneath the pin.
       No background block on the wrapper — the pin IS the visual. */
    .cobe-label {
      position: absolute;
      bottom: anchor(top);
      left: anchor(center);
      translate: -50% -2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
      transition: opacity 0.28s cubic-bezier(.2,0,0,1), translate 0.4s cubic-bezier(.2,0,0,1);
      filter: drop-shadow(0 2px 6px rgba(11,12,15,.18));
    }
    .cobe-label__pin {
      display: block;
      transform-origin: 50% 100%;
      animation: cobePinDrop 480ms cubic-bezier(.2,.8,.2,1) both;
    }
    .cobe-label__name {
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-primary);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      line-height: 1;
    }
    @keyframes cobePinDrop {
      0%   { transform: translateY(-6px) scale(0.7); opacity: 0; }
      60%  { transform: translateY(1px) scale(1.04); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .cobe-label__pin { animation: none; }
    }

    /* Sales sheet — proper modal open/close. Backdrop fades, sheet scales
       from 96% with origin at viewport center. data-state attribute drives
       the direction so close gets a real animation, not a snap. */
    .kit-sheet-backdrop {
      position: fixed; inset: 0; background: rgba(11,12,15,.42);
      display: grid; place-items: center; z-index: 100;
      transition: opacity 220ms cubic-bezier(0.32, 0.72, 0, 1);
    }
    .kit-sheet-backdrop[data-state="open"]    { opacity: 1; }
    .kit-sheet-backdrop[data-state="closing"] { opacity: 0; pointer-events: none; }
    .kit-sheet {
      background: var(--bg-surface); border-radius: 24px; padding: 36px;
      width: min(560px, 92vw); box-shadow: var(--shadow-e4);
      transform-origin: center center;
      transition:
        opacity 220ms cubic-bezier(0.32, 0.72, 0, 1),
        transform 260ms cubic-bezier(0.32, 0.72, 0, 1);
    }
    .kit-sheet-backdrop[data-state="open"]    .kit-sheet { opacity: 1; transform: scale(1) translateY(0); }
    .kit-sheet-backdrop[data-state="closing"] .kit-sheet { opacity: 0; transform: scale(0.96) translateY(8px); }
    @media (prefers-reduced-motion: reduce) {
      .kit-sheet-backdrop, .kit-sheet { transition: opacity 100ms linear, transform 100ms linear; }
    }
    .kit-field { display: flex; flex-direction: column; gap: 6px; }
    .kit-field label {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted);
    }
    .kit-field input, .kit-field textarea {
      height: 44px; border-radius: 12px;
      background: var(--bg-surface-raised); border: 1px solid var(--border-subtle);
      padding: 0 14px; font-family: var(--font-sans); font-size: 14px;
      color: var(--text-primary); transition: border-color 160ms, background 160ms;
    }
    .kit-field textarea { height: 96px; padding: 12px 14px; resize: none; }
    .kit-field input:focus, .kit-field textarea:focus {
      outline: none; border-color: var(--accent-default); background: var(--bg-surface);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-default) 15%, transparent);
    }
    .kit-field.error input { border-color: var(--feedback-danger); background: var(--feedback-danger-subtle); }
    .kit-field .err { color: var(--feedback-danger); font-size: 12px; }
  </style>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Sales sheet ────────────────────────────────────────
    function SalesSheet({ open, onClose }) {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [org, setOrg] = useState('');
      const [note, setNote] = useState('');
      const [submitted, setSubmitted] = useState(false);

      // Mount-state machine: 'closed' → not in DOM. 'opening' → in DOM,
      // about to play open transition. 'open' → settled. 'closing' →
      // playing close transition; unmount when it ends.
      const [phase, setPhase] = useState('closed');
      useEffect(() => {
        if (open && phase === 'closed') {
          setPhase('opening');
          // Next frame, flip to 'open' so the CSS transition runs.
          requestAnimationFrame(() => requestAnimationFrame(() => setPhase('open')));
        } else if (!open && (phase === 'open' || phase === 'opening')) {
          setPhase('closing');
          const t = setTimeout(() => setPhase('closed'), 280);
          return () => clearTimeout(t);
        }
      }, [open, phase]);

      const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const emailErr = email !== '' && !emailRx.test(email);

      if (phase === 'closed') return null;
      // 'opening' uses the same data-state as 'closing' — both render the
      // not-yet-visible look. Only 'open' shows the settled state.
      const dataState = phase === 'open' ? 'open' : 'closing';
      return (
        <div className="kit-sheet-backdrop" data-state={dataState} onClick={onClose}>
          <div className="kit-sheet" onClick={(e) => e.stopPropagation()}>
            {!submitted ? (
              <>
                <Eyebrow accent style={{ marginBottom: 16 }}>Talk to sales</Eyebrow>
                <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 28,
                             letterSpacing: '-0.015em', margin: 0, color: 'var(--text-primary)' }}>
                  Tell us about your institution.
                </h2>
                <p style={{ marginTop: 8, color: 'var(--text-secondary)', fontSize: 15 }}>
                  A senior partnerships lead will respond within two business days.
                </p>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginTop: 24 }}>
                  <div className="kit-field">
                    <label>Full name</label>
                    <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Adaeze Okafor" />
                  </div>
                  <div className={'kit-field' + (emailErr ? ' error' : '')}>
                    <label>Work email</label>
                    <input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="adaeze@treasury.gov" />
                    {emailErr && <span className="err">Use your official institutional address.</span>}
                  </div>
                </div>
                <div className="kit-field" style={{ marginTop: 16 }}>
                  <label>Institution</label>
                  <input value={org} onChange={(e) => setOrg(e.target.value)} placeholder="Federal Inland Revenue Service" />
                </div>
                <div className="kit-field" style={{ marginTop: 16 }}>
                  <label>What are you exploring?</label>
                  <textarea value={note} onChange={(e) => setNote(e.target.value)}
                            placeholder="A few sentences on the system you're modernising or the rails you need." />
                </div>

                <div style={{ display: 'flex', gap: 12, marginTop: 28, justifyContent: 'flex-end' }}>
                  <Button variant="ghost" size="md" withChip={false} onClick={onClose}>Cancel</Button>
                  <Button variant="primary" size="md"
                          onClick={() => {
                            if (!name || !email || !org || emailErr) return;
                            setSubmitted(true);
                          }}>
                    Send request
                  </Button>
                </div>
              </>
            ) : (
              <div style={{ textAlign: 'center', padding: '12px 8px 4px' }}>
                <div style={{
                  display: 'inline-grid', placeItems: 'center', width: 56, height: 56,
                  borderRadius: 9999, background: 'var(--accent-subtle)', color: 'var(--accent-default)',
                  marginBottom: 16,
                }}>
                  <Icon name="shieldCheck" size={26} />
                </div>
                <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 26,
                             letterSpacing: '-0.015em', margin: 0 }}>Received.</h2>
                <p style={{ marginTop: 8, color: 'var(--text-secondary)', fontSize: 15 }}>
                  Our partnerships team has your note. Expect a response within two business days, addressed to <b>{email}</b>.
                </p>
                <div style={{ marginTop: 24 }}>
                  <Button variant="secondary" size="md" withChip={false} onClick={onClose}>Close</Button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

      );
    }

    // Wire the hero "Talk to sales" anchor to also open the sheet.
    function App() {
      const [, setN] = useState(0);
      // Stage section reveals on scroll-in.
      useRevealObserver();
      React.useEffect(() => {
        const handler = (e) => {
          const a = e.target.closest('a, button');
          if (!a) return;
          const txt = (a.textContent || '').trim().toLowerCase();
          if (txt === 'talk to sales') {
            e.preventDefault();
            window.dispatchEvent(new CustomEvent('open-sales'));
          }
        };
        document.addEventListener('click', handler);
        return () => document.removeEventListener('click', handler);
      }, []);
      return <Page />;
    }

    // Lift sheet open state to a global event since Page already owns it.
    const Root = () => {
      const [open, setOpen] = useState(false);
      React.useEffect(() => {
        const fn = () => setOpen(true);
        window.addEventListener('open-sales', fn);
        return () => window.removeEventListener('open-sales', fn);
      }, []);
      return (
        <>
          <Page />
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
